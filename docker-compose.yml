services:
  postgres:
    image: postgres:16-alpine
    container_name: tableorder-db
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: tableorder
      POSTGRES_PASSWORD: tableorder
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableorder"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tableorder-backend
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: tableorder
      DB_PASSWORD: tableorder
      JWT_SECRET: ${JWT_SECRET:-production-secret-key-must-be-at-least-256-bits-long-change-me!!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IMAGE_UPLOAD_DIR: /app/uploads/images
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tableorder
    volumes:
      - image-uploads:/app/uploads/images
      - app-logs:/var/log/tableorder
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  image-uploads:
  app-logs:
